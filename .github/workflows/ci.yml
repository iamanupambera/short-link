name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: short_link_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      PORT: 3000
      NODE_ENV: test
      CLIENT_URL: http://localhost:3001
      API_URL: http://localhost:3000
      ACCESS_TOKEN_SECRET: test_jwt_secret_token_123456!!!
      ACCESS_TOKEN_EXPIRY: 1d
      REFRESH_TOKEN_EXPIRY: 30d
      BCRYPT_SALT_ROUNDS: 4
      OTP_EXPIRY_SECONDS: 300
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: rootpassword
      DB: short_link_test
      DB_SYNCHRONIZE: true
      DB_LOGGING: false
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      REDIS_DB: 0
      IP_SALT_SECRET: testipkeys123
      MAIL_DRIVER: smtp
      MAIL_HOST: localhost
      MAIL_PORT: 1025
      MAIL_USER: test@test.com
      MAIL_PASSWORD: testpassword
      MAIL_ENCRYPTION: tls
      MAIL_FROM: no_reply@short-link.com
      MAIL_FROM_NAME: ShortLink

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Run unit tests
        run: npm run test

      - name: Run E2E tests
        run: npm run test:e2e
